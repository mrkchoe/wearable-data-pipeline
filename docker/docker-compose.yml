# Full local stack: Postgres (warehouse), MinIO (S3), Airflow (orchestration).
# From repo root: docker compose -f docker/docker-compose.yml up -d
# Copy infra/.env.example to .env in the repo root (optional; defaults below work for MinIO).

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-wJ73vIybss1Heo5UnrKJ8k2EDX2Nr-bzlBd9jBTpkWo=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
    PYTHONPATH: /opt/airflow/project
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: wearable
    DB_USER: wearable
    DB_PASSWORD: wearable
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    S3_ENDPOINT_URL: http://minio:9000
    S3_BUCKET: ${S3_BUCKET:-wearable-lake}
    S3_PREFIX: ${S3_PREFIX:-raw}
    DATA_DROP_DIR: /opt/airflow/project/sample_data
    LOG_LEVEL: INFO
  volumes:
    - ../:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - wearable

services:
  postgres:
    image: postgres:16
    container_name: wearable_postgres
    environment:
      POSTGRES_USER: wearable
      POSTGRES_PASSWORD: wearable
      POSTGRES_DB: wearable
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wearable

  minio:
    image: minio/minio:latest
    container_name: wearable_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wearable

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for i in $(seq 1 40); do
          mc alias set local http://minio:9000 minioadmin minioadmin && break
          sleep 2
        done
        mc mb --ignore-existing local/wearable-lake || true
    networks:
      - wearable

  airflow-db:
    image: postgres:16
    container_name: wearable_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    networks:
      - wearable

  airflow-init:
    <<: *airflow-common
    container_name: wearable_airflow_init
    depends_on:
      - airflow-db
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User --role Admin --email admin@example.com \
          || true

  airflow-webserver:
    <<: *airflow-common
    container_name: wearable_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      minio:
        condition: service_started

  airflow-scheduler:
    <<: *airflow-common
    container_name: wearable_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      minio:
        condition: service_started

volumes:
  pgdata:
  minio_data:
  airflow_db:

networks:
  wearable:
    name: wearable
